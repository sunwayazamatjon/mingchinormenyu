<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mingchinor Kafe — Menyu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec;
    --card: #fff8ef;
    --accent: #c0522a;
    --accent2: #e8a045;
    --text: #2a1a0e;
    --muted: #8a6a50;
    --border: #e8d8c4;
    --green: #3a7d44;
    --red: #d32f2f;
    --shadow: 0 4px 24px rgba(80,40,10,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN PAGE */
  .login-page {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .login-page.hidden {
    display: none;
  }

  .login-box {
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
    width: 90%;
    max-width: 400px;
  }

  .login-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .login-box p {
    color: var(--muted);
    margin-bottom: 24px;
    font-size: 0.95rem;
  }

  .login-box input {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    margin-bottom: 16px;
    transition: 0.2s;
  }

  .login-box input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(192,82,42,0.2);
  }

  .login-box button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }

  .login-box button:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
  }

  .error-msg {
    color: var(--red);
    font-size: 0.9rem;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show {
    display: block;
  }

  /* ADMIN PANEL */
  .admin-panel {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    padding: 20px;
    margin: 20px;
    border-radius: 14px;
    color: #fff;
    box-shadow: 0 4px 16px rgba(192,82,42,0.35);
  }

  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .admin-header h3 {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .logout-btn {
    padding: 8px 16px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    transition: 0.2s;
  }

  .logout-btn:hover {
    background: #b71c1c;
  }

  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .search-box input {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
  }

  .search-box button {
    padding: 10px 16px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    transition: 0.2s;
  }

  .search-box button:hover {
    background: #b71c1c;
    transform: scale(1.05);
  }

  .search-results {
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
  }

  .search-result-item {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .search-result-item:last-child {
    border-bottom: none;
  }

  .search-result-item .name {
    font-weight: 600;
    color: var(--text);
  }

  .search-result-item button {
    padding: 6px 12px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
    transition: 0.2s;
  }

  .search-result-item button:hover {
    background: #b71c1c;
  }

  .search-result-item.unavailable .name {
    opacity: 0.6;
    text-decoration: line-through;
  }

  .success-msg {
    background: var(--green);
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    margin-top: 8px;
    font-weight: 600;
    display: none;
  }

  .success-msg.show {
    display: block;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #2a1a0e 60%, #5a2d0c 100%);
    padding: 36px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .logo-circle {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    position: relative; z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .logo-sub {
    color: var(--accent2);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    position: relative; z-index: 1;
  }

  /* CATEGORY TABS */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 18px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tab {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--card);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active, .tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* MENU */
  .menu {
    padding: 14px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 560px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--accent);
    font-weight: 700;
    margin-top: 6px;
    padding-left: 10px;
    border-left: 3px solid var(--accent2);
  }

  .item-card {
    background: var(--card);
    border-radius: 18px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.4s both;
  }

  .item-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(80,40,10,0.13);
  }

  .item-card.unavailable {
    opacity: 0.6;
    background: #f5f5f5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-emoji {
    font-size: 2.4rem;
    flex-shrink: 0;
    width: 54px; height: 54px;
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #f0d4a0;
  }

  .item-info {
    flex: 1;
    min-width: 0;
  }

  .item-name {
    font-weight: 700;
    font-size: 0.97rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-desc {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .item-price {
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--accent);
    margin-top: 5px;
  }

  .item-control {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-add {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(192,82,42,0.35);
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
  }

  .btn-add:hover { background: #a0411e; transform: scale(1.08); }

  .btn-unavailable {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #d0d0d0;
    color: #999;
    border: none;
    font-size: 1rem;
    cursor: not-allowed;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .counter-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff3e8;
    border-radius: 24px;
    padding: 4px 8px;
    border: 1.5px solid var(--accent2);
  }

  .btn-counter {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    transition: 0.15s;
  }

  .btn-minus { background: #e0e0e0; color: #555; }
  .btn-minus:hover { background: #c0c0c0; }
  .btn-plus2 { background: var(--accent); color: #fff; }
  .btn-plus2:hover { background: #a0411e; }

  .count-num {
    font-weight: 800;
    font-size: 1rem;
    min-width: 18px;
    text-align: center;
    color: var(--text);
  }

  /* CART BAR */
  .cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 2px solid var(--border);
    padding: 14px 20px 20px;
    box-shadow: 0 -4px 24px rgba(80,40,10,0.12);
    z-index: 100;
    transition: transform 0.3s;
  }

  .cart-bar.hidden { transform: translateY(110%); }

  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .cart-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  .cart-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 0.8rem;
    font-weight: 700;
  }

  .cart-items-list {
    max-height: 130px;
    overflow-y: auto;
    margin-bottom: 10px;
  }

  .cart-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .cart-row-name { color: var(--text); font-weight: 600; }
  .cart-row-price { color: var(--accent); font-weight: 700; }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 8px;
    border-top: 2px solid var(--border);
  }

  .cart-total-label { font-weight: 700; font-size: 0.95rem; }
  .cart-total-sum {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
  }

  .btn-order {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #e8552a);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(192,82,42,0.35);
    transition: 0.2s;
  }

  .btn-order:hover { filter: brightness(1.08); transform: translateY(-1px); }

  /* TOAST */
  .toast {
    position: fixed;
    top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--green);
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 0.9rem;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.23,1.5,.5,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #fff;
    border-radius: 28px 28px 0 0;
    padding: 32px 24px 40px;
    width: 100%;
    max-width: 560px;
    text-align: center;
    animation: slideUp 0.3s;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-icon { font-size: 3rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .modal-text { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }
  .btn-close-modal {
    padding: 12px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h2>🔐 Admin Panel</h2>
    <p>Taomlarni boshqarish uchun parol kiriting</p>
    <input type="password" id="passwordInput" placeholder="Parolni yozing..." />
    <button onclick="checkPassword()">Kirish</button>
    <div class="error-msg" id="errorMsg">❌ Parol notog'ri!</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel hidden" id="adminPanel">
  <div class="admin-header">
    <h3>🔧 Taomni Boshqarish</h3>
    <button class="logout-btn" onclick="logout()">Chiqish</button>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Taom nomini yozing..." />
    <button onclick="searchAndToggle()">Qidirish</button>
  </div>
  <div class="search-results" id="searchResults"></div>
  <div class="success-msg" id="successMsg"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo-circle">🌿</div>
  <div class="logo-title">Mingchinor Kafe</div>
  <div class="logo-sub">Elektron Menyu</div>
</div>

<!-- CATEGORY TABS -->
<div class="tabs" id="tabsEl"></div>

<!-- MENU -->
<div class="menu" id="menuEl"></div>

<!-- CART BAR -->
<div class="cart-bar hidden" id="cartBar">
  <div class="cart-header">
    <div class="cart-title">🛒 Savat</div>
    <div class="cart-badge" id="cartCount">0 ta</div>
  </div>
  <div class="cart-items-list" id="cartList"></div>
  <div class="cart-total-row">
    <div class="cart-total-label">Jami:</div>
    <div class="cart-total-sum" id="cartTotal">0 so'm</div>
  </div>
  <button class="btn-order" onclick="placeOrder()">✅ Buyurtma berish</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon">🎉</div>
    <div class="modal-title">Buyurtma qabul qilindi!</div>
    <div class="modal-text">Tez orada ofitsiant siz bilan bog'lanadi. Rahmat!</div>
    <button class="btn-close-modal" onclick="closeModal()">Yopish</button>
  </div>
</div>

<script>
// PAROL (O'zgarting!)
const ADMIN_PASSWORD = "mingchinor123";

let isAuthenticated = false;

// URL-ni tekshir
function checkURL() {
  const path = window.location.pathname;
  if (path.includes('/edit')) {
    document.getElementById('loginPage').classList.remove('hidden');
    isAuthenticated = false;
  } else {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
    isAuthenticated = false;
  }
}

// PAROL TEKSHIR
function checkPassword() {
  const password = document.getElementById('passwordInput').value;
  const errorMsg = document.getElementById('errorMsg');

  if (password === ADMIN_PASSWORD) {
    isAuthenticated = true;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    errorMsg.classList.remove('show');
  } else {
    errorMsg.classList.add('show');
    document.getElementById('passwordInput').value = '';
  }
}

// CHIQISH
function logout() {
  isAuthenticated = false;
  window.location.href = window.location.origin + window.location.pathname.replace('/edit', '');
}

// ENTER TUGMASI BILAN LOGIN
document.addEventListener('DOMContentLoaded', () => {
  checkURL();
  renderMenu(null);
  
  const passwordInput = document.getElementById('passwordInput');
  if (passwordInput) {
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  }

  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchAndToggle();
    });
  }
});

const menuData = [
  {
    category: "🍜 Birinchi taomlar",
    items: [
      { id: 1, emoji: "🥣", name: "Mastava", desc: "Qo'zichoq go'shti, sabzavotlar", price: 28000, available: true },
      { id: 2, emoji: "🍲", name: "Shurva", desc: "Qo'y go'shti, karam, sabzi", price: 25000, available: true },
      { id: 3, emoji: "🥘", name: "Lagman", desc: "El noodles, go'sht, sabzavot", price: 32000, available: true },
      { id: 4, emoji: "🫕", name: "Moshxo'rda", desc: "Mosh, guruch, yog'", price: 22000, available: true },
    ]
  },
  {
    category: "🍽️ Ikkinchi taomlar",
    items: [
      { id: 5, emoji: "🍚", name: "Osh (Palov)", desc: "Qo'zichoq go'shti, sabzi, guruch", price: 38000, available: true },
      { id: 6, emoji: "🥩", name: "Kabob", desc: "Qo'y go'shti, zira, piyoz", price: 45000, available: true },
      { id: 7, emoji: "🫔", name: "Dimlama", desc: "Go'sht, kartoshka, sabzavotlar", price: 35000, available: true },
      { id: 8, emoji: "🍗", name: "Tovuq qovurma", desc: "Basmati guruch bilan", price: 40000, available: true },
      { id: 9, emoji: "🥗", name: "Achichuk salat", desc: "Pomidor, bodring, piyoz, ko'k", price: 15000, available: true },
    ]
  },
  {
    category: "🫓 Non va sneklar",
    items: [
      { id: 10, emoji: "🫓", name: "Patir non", desc: "Tandirda pishirilgan", price: 8000, available: true },
      { id: 11, emoji: "🥙", name: "Somsa", desc: "Go'shtli, yangi pishirilgan", price: 12000, available: true },
      { id: 12, emoji: "🥟", name: "Manti", desc: "Qo'y go'shti bilan (6 dona)", price: 30000, available: true },
    ]
  },
  {
    category: "🧃 Ichimliklar",
    items: [
      { id: 13, emoji: "🍵", name: "Ko'k choy", desc: "Chinni piyolada", price: 8000, available: true },
      { id: 14, emoji: "☕", name: "Qora choy", desc: "Limon bilan", price: 8000, available: true },
      { id: 15, emoji: "🧃", name: "Sharbat", desc: "Mavsumiy mevalar", price: 18000, available: true },
      { id: 16, emoji: "🥛", name: "Ayron", desc: "Yangi, sovuq", price: 12000, available: true },
      { id: 17, emoji: "💧", name: "Mineral suv", desc: "Gaz'li / gaz'siz (0.5L)", price: 7000, available: true },
    ]
  },
  {
    category: "🍰 Shirinliklar",
    items: [
      { id: 18, emoji: "🍯", name: "Halva", desc: "An'anaviy, yong'oq bilan", price: 20000, available: true },
      { id: 19, emoji: "🍮", name: "Murabbo", desc: "O'rik murabbo, qaymoq", price: 15000, available: true },
      { id: 20, emoji: "🍩", name: "Pishiriqlar", desc: "Kunlik assortment", price: 14000, available: true },
    ]
  }
];

let cart = {};

function fmt(n) {
  return n.toLocaleString('uz-UZ') + " so'm";
}

// SEARCH & TOGGLE
function searchAndToggle() {
  if (!isAuthenticated) return;

  const searchInput = document.getElementById('searchInput').value.toLowerCase();
  const searchResults = document.getElementById('searchResults');
  const successMsg = document.getElementById('successMsg');

  if (!searchInput.trim()) {
    searchResults.innerHTML = '<p style="color: var(--muted); text-align: center;">Taom nomini yozing</p>';
    return;
  }

  let found = [];
  for (const category of menuData) {
    for (const item of category.items) {
      if (item.name.toLowerCase().includes(searchInput)) {
        found.push(item);
      }
    }
  }

  if (found.length === 0) {
    searchResults.innerHTML = '<p style="color: var(--red); text-align: center;">Taom topilmadi ❌</p>';
    return;
  }

  searchResults.innerHTML = '';
  found.forEach(item => {
    const div = document.createElement('div');
    div.className = `search-result-item ${!item.available ? 'unavailable' : ''}`;
    div.innerHTML = `
      <span class="name">${item.emoji} ${item.name}</span>
      <button onclick="toggleAvailability(${item.id})">${item.available ? 'O\'chir' : 'Yoq'}</button>
    `;
    searchResults.appendChild(div);
  });
}

// TOGGLE AVAILABILITY
function toggleAvailability(itemId) {
  for (const category of menuData) {
    const item = category.items.find(i => i.id === itemId);
    if (item) {
      item.available = !item.available;
      renderMenu(null);
      searchAndToggle();

      const successMsg = document.getElementById('successMsg');
      successMsg.textContent = `✅ ${item.name} ${item.available ? 'yoqildi ✓' : 'o\'chirildi ⏸️'}`;
      successMsg.classList.add('show');
      setTimeout(() => successMsg.classList.remove('show'), 3000);

      return;
    }
  }
}

// RENDER TABS
const tabsEl = document.getElementById('tabsEl');
const allTab = document.createElement('div');
allTab.className = 'tab active';
allTab.textContent = '🍴 Barchasi';
allTab.onclick = () => { filterCategory(null); setActiveTab(allTab); };
tabsEl.appendChild(allTab);

menuData.forEach(sec => {
  const t = document.createElement('div');
  t.className = 'tab';
  t.textContent = sec.category;
  t.onclick = () => { filterCategory(sec.category); setActiveTab(t); };
  tabsEl.appendChild(t);
});

function setActiveTab(el) {
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// RENDER MENU
function renderMenu(filter) {
  const menuEl = document.getElementById('menuEl');
  menuEl.innerHTML = '';
  let delay = 0;

  menuData.forEach(sec => {
    if (filter && sec.category !== filter) return;

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = sec.category;
    menuEl.appendChild(title);

    sec.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';
      if (!item.available) card.classList.add('unavailable');
      card.style.animationDelay = delay + 'ms';
      delay += 60;

      card.innerHTML = `
        <div class="item-emoji">${item.emoji}</div>
        <div class="item-info">
          <div class="item-name">${item.name}${!item.available ? ' ⏸️' : ''}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-price">${fmt(item.price)}</div>
        </div>
        <div class="item-control" id="ctrl-${item.id}"></div>
      `;
      menuEl.appendChild(card);
      renderControl(item);
    });
  });
}

function renderControl(item) {
  const ctrl = document.getElementById('ctrl-' + item.id);
  if (!ctrl) return;

  if (!item.available) {
    ctrl.innerHTML = `<button class="btn-unavailable" disabled>⏸️</button>`;
    return;
  }

  const qty = cart[item.id] ? cart[item.id].qty : 0;
  if (qty === 0) {
    ctrl.innerHTML = `<button class="btn-add" onclick="addItem(${item.id})">+</button>`;
  } else {
    ctrl.innerHTML = `
      <div class="counter-wrap">
        <button class="btn-counter btn-minus" onclick="changeQty(${item.id}, -1)">−</button>
        <div class="count-num">${qty}</div>
        <button class="btn-counter btn-plus2" onclick="changeQty(${item.id}, +1)">+</button>
      </div>`;
  }
}

function getItem(id) {
  for (const sec of menuData) {
    const found = sec.items.find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

function addItem(id) {
  const item = getItem(id);
  if (!item || !item.available) return;
  cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { item, qty: 1 };
  renderControl(item);
  updateCart();
  showToast('✅ ' + item.name + ' qo\'shildi');
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  const item = getItem(id);
  renderControl(item);
  updateCart();
}

function updateCart() {
  const entries = Object.values(cart);
  const totalQty = entries.reduce((s, e) => s + e.qty, 0);
  const totalSum = entries.reduce((s, e) => s + e.qty * e.item.price, 0);

  const bar = document.getElementById('cartBar');
  const countEl = document.getElementById('cartCount');
  const totalEl = document.getElementById('cartTotal');
  const listEl = document.getElementById('cartList');

  if (entries.length === 0) {
    bar.classList.add('hidden');
    return;
  }

  bar.classList.remove('hidden');
  countEl.textContent = totalQty + ' ta';
  totalEl.textContent = fmt(totalSum);

  listEl.innerHTML = '';
  entries.forEach(e => {
    const row = document.createElement('div');
    row.className = 'cart-row';
    row.innerHTML = `
      <div class="cart-row-name">${e.item.emoji} ${e.item.name} × ${e.qty}</div>
      <div class="cart-row-right">
        <div class="cart-row-price">${fmt(e.qty * e.item.price)}</div>
      </div>`;
    listEl.appendChild(row);
  });
}

function filterCategory(cat) {
  renderMenu(cat);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function placeOrder() {
  document.getElementById('modal').classList.add('open');
  cart = {};
  updateCart();
  renderMenu(null);
  document.getElementById('cartBar').classList.add('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
</script>
</body>
</html>
